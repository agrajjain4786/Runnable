<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>City Agent — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --panel:#11161F;
    --panel-2:#161C27;
    --border:#212a38;
    --text:#E7EAEE;
    --text-muted:#7C8798;
    --amber:#FFB627;
    --green:#36D399;
    --red:#FF5C5C;
    --blue:#4DA3FF;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(77,163,255,0.07), transparent),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
  }
  .console{
    width:100%;
    max-width:760px;
    margin:0 auto;
    height:100%;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--border);
    border-right:1px solid var(--border);
  }

  /* ---------- header ---------- */
  header{
    padding:18px 22px 14px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
    letter-spacing:0.02em;
  }
  .brand span{color:var(--text-muted);font-weight:500;}
  .status-pill{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--text-muted);
    padding:5px 10px;
    border:1px solid var(--border);
    border-radius:20px;
    background:var(--panel);
  }
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-muted);transition:background .2s;}
  .status-dot.idle{background:var(--text-muted);}
  .status-dot.thinking{background:var(--blue);animation:pulse 1s infinite;}
  .status-dot.awaiting{background:var(--amber);animation:pulse .8s infinite;}

  /* ---------- instrument strip ---------- */
  .instruments{
    display:flex;
    gap:8px;
    padding:12px 22px;
    border-bottom:1px solid var(--border);
  }
  .chip{
    display:flex;
    align-items:center;
    gap:6px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.05em;
    color:var(--text-muted);
    background:var(--panel);
    border:1px solid var(--border);
    padding:6px 10px;
    border-radius:6px;
    transition:border-color .25s, color .25s;
  }
  .chip .dot{width:6px;height:6px;border-radius:50%;background:#3a4456;transition:background .25s, box-shadow .25s;}
  .chip.pending{border-color:var(--amber);color:var(--amber);}
  .chip.pending .dot{background:var(--amber);box-shadow:0 0 8px var(--amber);animation:pulse .8s infinite;}
  .chip.active{border-color:var(--green);color:var(--green);}
  .chip.active .dot{background:var(--green);box-shadow:0 0 8px var(--green);}

  /* ---------- chat ---------- */
  .chat{
    flex:1;
    overflow-y:auto;
    padding:22px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--text-muted);
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    line-height:1.7;
    max-width:340px;
  }
  .empty-state b{color:var(--text);}

  .row{display:flex;}
  .row.user{justify-content:flex-end;}
  .bubble{
    max-width:78%;
    padding:11px 14px;
    border-radius:10px;
    font-size:14.5px;
    line-height:1.55;
    white-space:pre-wrap;
  }
  .row.user .bubble{
    background:var(--blue);
    color:#06121f;
    border-bottom-right-radius:3px;
  }
  .row.agent .bubble{
    background:var(--panel);
    border:1px solid var(--border);
    border-bottom-left-radius:3px;
  }

  /* ---------- approval card ---------- */
  .approval-card{
    width:100%;
    max-width:78%;
    background:var(--panel-2);
    border:1px solid var(--amber);
    border-left:3px solid var(--amber);
    border-radius:8px;
    padding:13px 14px;
    font-family:'JetBrains Mono',monospace;
  }
  .approval-card .label{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:11px;
    letter-spacing:0.06em;
    color:var(--amber);
    margin-bottom:8px;
  }
  .approval-card .blink{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:pulse .8s infinite;}
  .approval-card .tool-name{font-size:13.5px;color:var(--text);margin-bottom:4px;}
  .approval-card .tool-args{font-size:12px;color:var(--text-muted);margin-bottom:12px;word-break:break-word;}
  .approval-actions{display:flex;gap:8px;}
  .btn-approve,.btn-deny{
    flex:1;
    padding:8px 0;
    border-radius:5px;
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;
    letter-spacing:0.05em;
    border:1px solid;
    cursor:pointer;
    background:transparent;
    transition:transform .08s, background .15s;
  }
  .btn-approve{border-color:var(--green);color:var(--green);}
  .btn-approve:hover{background:rgba(54,211,153,0.12);}
  .btn-deny{border-color:var(--red);color:var(--red);}
  .btn-deny:hover{background:rgba(255,92,92,0.12);}
  .btn-approve:active,.btn-deny:active{transform:scale(0.97);}
  .approval-resolved{
    font-size:11.5px;
    letter-spacing:0.05em;
    padding:7px 0;
    text-align:center;
    border-radius:5px;
  }
  .approval-resolved.approved{color:var(--green);background:rgba(54,211,153,0.08);}
  .approval-resolved.denied{color:var(--red);background:rgba(255,92,92,0.08);}

  /* ---------- input bar ---------- */
  .input-bar{
    display:flex;
    gap:10px;
    padding:16px 22px 20px;
    border-top:1px solid var(--border);
  }
  .input-bar input{
    flex:1;
    background:var(--panel);
    border:1px solid var(--border);
    color:var(--text);
    border-radius:8px;
    padding:12px 14px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    outline:none;
  }
  .input-bar input:focus{border-color:var(--blue);}
  .input-bar input::placeholder{color:var(--text-muted);}
  .input-bar button{
    background:var(--blue);
    color:#06121f;
    border:none;
    border-radius:8px;
    padding:0 18px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:13.5px;
    cursor:pointer;
  }
  .input-bar button:disabled{opacity:0.4;cursor:not-allowed;}

  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.35;}}
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#232c3a;border-radius:8px;}
</style>
</head>
<body>

<div class="console">
  <header>
    <div class="brand">CITY AGENT <span>// CONSOLE</span></div>
    <div class="status-pill"><span class="status-dot idle" id="statusDot"></span><span id="statusText">IDLE</span></div>
  </header>

  <div class="instruments">
    <div class="chip" id="chip-get_weather"><span class="dot"></span>WEATHER</div>
    <div class="chip" id="chip-get_news"><span class="dot"></span>NEWS</div>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state" id="emptyState">
      AWAITING INPUT<br><br>
      Try: <b>"what's the weather in Tokyo, and any news there?"</b><br><br>
      Every tool call needs your sign-off before it runs.
    </div>
  </div>

  <div class="input-bar">
    <input id="messageInput" type="text" placeholder="Ask about a city…" autocomplete="off" disabled />
    <button id="sendBtn" disabled>SEND</button>
  </div>
</div>

<script>
const chat = document.getElementById('chat');
const emptyState = document.getElementById('emptyState');
const input = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

const TOOL_LABELS = { get_weather: 'WEATHER', get_news: 'NEWS' };

const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/ws`);

ws.onopen = () => {
  input.disabled = false;
  sendBtn.disabled = false;
  setStatus('idle');
};
ws.onclose = () => setStatus('offline');

ws.onmessage = (event) => {
  const msg = JSON.parse(event.data);
  if (msg.type === 'status') {
    setStatus(msg.state);
  } else if (msg.type === 'approval_request') {
    setStatus('awaiting');
    setChip(msg.tool, 'pending');
    addApprovalCard(msg);
  } else if (msg.type === 'agent_message') {
    addBubble('agent', msg.content);
  }
};

function setStatus(state) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = {
    idle: 'IDLE', thinking: 'THINKING…', awaiting: 'AWAITING APPROVAL', offline: 'DISCONNECTED'
  }[state] || state.toUpperCase();
  sendBtn.disabled = (state === 'thinking' || state === 'offline');
}

function setChip(tool, state) {
  const chip = document.getElementById('chip-' + tool);
  if (!chip) return;
  chip.className = 'chip' + (state ? ' ' + state : '');
}

function hideEmptyState() {
  if (emptyState) emptyState.remove();
}

function addBubble(role, text) {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'row ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function addApprovalCard(msg) {
  hideEmptyState();
  const row = document.createElement('div');
  row.className = 'row agent';

  const card = document.createElement('div');
  card.className = 'approval-card';
  card.innerHTML = `
    <div class="label"><span class="blink"></span>TOOL CALL REQUESTED</div>
    <div class="tool-name">${TOOL_LABELS[msg.tool] || msg.tool}</div>
    <div class="tool-args">args: ${escapeHtml(JSON.stringify(msg.args))}</div>
    <div class="approval-actions">
      <button class="btn-approve">✓ APPROVE</button>
      <button class="btn-deny">✕ DENY</button>
    </div>
  `;

  card.querySelector('.btn-approve').onclick = () => resolve(true);
  card.querySelector('.btn-deny').onclick = () => resolve(false);

  function resolve(approved) {
    ws.send(JSON.stringify({ type: 'approval_response', id: msg.id, approved }));
    setChip(msg.tool, approved ? 'active' : '');
    setStatus('thinking');
    card.innerHTML = `<div class="approval-resolved ${approved ? 'approved' : 'denied'}">${approved ? '✓ APPROVED — running…' : '✕ DENIED'}</div>`;
  }

  row.appendChild(card);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addBubble('user', text);
  ws.send(JSON.stringify({ type: 'user_message', content: text }));
  input.value = '';
  setStatus('thinking');
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
</body>
</html>
